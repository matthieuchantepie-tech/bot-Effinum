<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Brevo</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      background: #F8B332;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, Helvetica, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .container { text-align: center; padding: 24px; }
    .logo { max-width: 360px; width: 35vw; height: auto; display:block; margin: 0 auto 20px; }
    .message { color: #ffffff; font-size: 1.25rem; font-weight: 700; }
  </style>
</head>
<body>
  <div class="container">
    <img src="logo.png" alt="Logo" class="logo" />
    <div class="message">Un assistant vous répondra dans quelques minutes</div>
  </div>

  <script>
    (function(d, w, c) {
        w.BrevoConversationsID = '6942d36d1a212c34d80c5ae8';
        w[c] = w[c] || function() {
            (w[c].q = w[c].q || []).push(arguments);
        };
        var s = d.createElement('script');
        s.async = true;
        s.src = 'https://conversations-widget.brevo.com/brevo-conversations.js';
        if (d.head) d.head.appendChild(s);
    })(document, window, 'BrevoConversations');
  </script>

</html>
